<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />

<main class="min-h-[80vh] flex items-center justify-center bg-white px-4 py-20 font-['Inter'] relative overflow-hidden">
  
  <div class="absolute inset-0 bg-pattern"></div>

  <div class="max-w-2xl w-full text-center relative z-10">
    
    <div class="mb-8 flex justify-center">
      <div class="relative">
        <div class="h-28 w-28 bg-green-100 rounded-full flex items-center justify-center animate-check">
          <span class="material-symbols-outlined text-6xl text-green-600 font-bold">check_circle</span>
        </div>
  
      </div>
    </div>

    <h1 class="text-6xl md:text-8xl font-[900] italic tracking-tighter uppercase mb-4 leading-[0.85] text-black">
      ĐẶT HÀNG<br><span class="text-transparent" style="-webkit-text-stroke: 1.5px black;">THÀNH CÔNG!</span>
    </h1>
    
    <p class="text-gray-500 font-bold uppercase tracking-[0.3em] text-[10px] md:text-xs mb-10">
      Cảm ơn bạn đã tin tưởng SportZone. Đơn hàng của bạn đang được chuẩn bị.
    </p>

    <div class="bg-white border-[3px] border-black p-8 mb-10 relative overflow-hidden neo-shadow">
      <div class="flex flex-col md:flex-row justify-between items-center gap-6 relative z-10">
        <div class="text-left w-full md:w-auto">
          <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Mã đơn hàng</p>
          <p class="text-2xl font-black italic">#{{ orderId() }}</p>
        </div>

        <div class="h-px w-full md:h-12 md:w-px bg-black"></div>

        <div class="text-left w-full md:w-auto">
          <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Trạng thái</p>
          <p class="text-sm font-bold uppercase text-green-600 flex items-center gap-2">
            <span class="h-3 w-3 bg-green-600 rounded-full status-badge-active"></span>
            Đang xử lý
          </p>
        </div>

        <div class="h-px w-full md:h-12 md:w-px bg-black"></div>

        <div class="text-left w-full md:w-auto">
          <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Thời gian dự kiến</p>
          <p class="text-sm font-bold uppercase italic">2 - 4 Ngày làm việc</p>
        </div>
      </div>
      
      <span class="absolute -right-8 -bottom-10 material-symbols-outlined text-[180px] opacity-[0.05] -rotate-12 pointer-events-none">
        bolt
      </span>
    </div>

    <div class="flex flex-col sm:flex-row gap-6 justify-center">
      <button routerLink="/orders" 
              class="px-10 py-4 bg-white border-[3px] border-black font-black text-xs uppercase tracking-[0.2em] hover:bg-black hover:text-white transition-all neo-shadow active:translate-y-1">
        Kiểm tra đơn hàng
      </button>
      <button routerLink="/" 
              class="px-10 py-4 bg-black text-white border-[3px] border-black font-black text-xs uppercase tracking-[0.2em] hover:bg-zinc-800 transition-all flex items-center justify-center gap-3 neo-shadow active:translate-y-1">
        Tiếp tục mua sắm
        <span class="material-symbols-outlined text-sm">shopping_cart</span>
      </button>
    </div>

    <div class="mt-16 pt-10 border-t-2 border-dashed border-gray-200 flex flex-col items-center gap-2">
      <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Gặp sự cố thanh toán?</p>
      <a href="tel:19001234" class="text-lg font-black italic hover:text-red-600 transition-colors underline decoration-2 underline-offset-4">
        HOTLINE: 1900 1234
      </a>
    </div>
  </div>
</main>
