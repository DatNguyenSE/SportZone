<div class="container mx-auto p-8 bg-zinc-50 min-h-screen font-sans">
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

    <div class="lg:col-span-1">
      <div class="bg-white p-6 rounded-xl shadow-sm border border-zinc-200 sticky top-24 transition-all duration-300"
           [class.border-blue-500]="isEditing" [class.ring-2]="isEditing" [class.ring-blue-100]="isEditing">
        
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-xl font-extrabold text-zinc-900 uppercase">
            {{ isEditing ? 'Cập Nhật' : 'Thêm Mới' }}
          </h2>
          <button *ngIf="isEditing" (click)="onCancelEdit()" 
                  class="text-[10px] font-bold bg-red-50 text-red-500 px-3 py-1.5 rounded-full hover:bg-red-100 uppercase transition-all">
            Hủy sửa
          </button>
        </div>

        <form (ngSubmit)="onSubmit()" class="space-y-4">
          <div class="flex gap-4 items-end">
            <div class="flex-1">
              <label class="text-[11px] font-bold text-zinc-500 uppercase">Tên Feature</label>
              <input type="text" [(ngModel)]="currentFeature.name" name="name" 
                     class="w-full mt-1 bg-zinc-100 border-transparent rounded text-sm p-2.5 outline-none focus:bg-white focus:border-zinc-800 transition-all">
            </div>
            <div class="flex flex-col items-center mb-1">
               <label class="text-[10px] font-bold text-zinc-400 uppercase mb-2 text-center">Home<br>Banner</label>
               <input type="checkbox" [(ngModel)]="currentFeature.isBanner" name="isBanner" 
                      class="size-5 rounded text-blue-600 cursor-pointer">
            </div>
          </div>

          <div>
            <label class="text-[11px] font-bold text-zinc-500 uppercase">Mô tả ngắn</label>
            <textarea [(ngModel)]="currentFeature.desc" name="desc" rows="2"
                      placeholder="Mô tả chiến dịch..."
                      class="w-full mt-1 bg-zinc-100 border-transparent rounded text-sm p-2.5 outline-none focus:bg-white focus:border-zinc-800 transition-all"></textarea>
          </div>

          <div class="p-4 bg-zinc-50 rounded-lg border border-zinc-200">
            <label class="text-[11px] font-bold text-zinc-500 uppercase mb-3 block">Gán sản phẩm cho Banner</label>
            <input type="text" placeholder="Lọc nhanh sản phẩm..." (input)="onSearchChange($event)"
                   class="w-full mb-3 bg-white border border-zinc-200 rounded text-xs p-2 outline-none">

            <div class="max-h-40 overflow-y-auto space-y-2 pr-2 custom-scrollbar">
              <div *ngFor="let prod of filteredProducts()" class="flex items-center justify-between p-2 bg-white rounded border border-zinc-100 hover:border-blue-200 transition-all">
                <div class="flex items-center gap-2">
                  <img [src]="prod.imageUrl" class="w-7 h-7 rounded object-cover" onerror="this.src='https://placehold.co/50'">
                  <span class="text-[11px] font-bold text-zinc-700">{{prod.name}}</span>
                </div>
                <input type="checkbox" [checked]="isProductSelected(prod.id)" (change)="toggleProductSelection(prod.id)"
                       class="rounded text-blue-600 size-4 cursor-pointer">
              </div>
            </div>
          </div>

          <div>
            <label class="text-[11px] font-bold text-zinc-500 uppercase block mb-1">Hình ảnh bìa</label>
            <div class="relative w-full h-32 bg-zinc-100 rounded border-2 border-dashed border-zinc-300 flex items-center justify-center overflow-hidden cursor-pointer hover:bg-zinc-200">
              <input type="file" (change)="onFileSelected($event)" class="absolute inset-0 opacity-0 z-10 cursor-pointer">
              <img *ngIf="imagePreview" [src]="imagePreview" class="absolute inset-0 w-full h-full object-cover">
              <span *ngIf="!imagePreview" class="text-zinc-400 text-[10px] font-bold uppercase">Tải ảnh lên</span>
            </div>
          </div>

          <button type="submit" [disabled]="isLoading" 
                  class="w-full text-white font-bold py-3 rounded uppercase text-xs tracking-widest shadow-lg active:scale-95 transition-all"
                  [ngClass]="isEditing ? 'bg-blue-600 hover:bg-blue-700' : 'bg-zinc-900 hover:bg-zinc-800'">
            {{ isLoading ? 'Đang lưu...' : (isEditing ? 'Lưu thay đổi' : 'Tạo mới') }}
          </button>
        </form>
      </div>
    </div>

    <div class="lg:col-span-2">
      <h2 class="text-xl font-extrabold text-zinc-900 mb-6 uppercase tracking-tight">
        Danh sách Banner ({{allFeatures().length}})
      </h2>

      <div class="grid grid-cols-1 gap-4">
        <div *ngFor="let feat of allFeatures()" 
             (click)="onEdit(feat)"
             class="bg-white rounded-xl border border-zinc-200 p-4 hover:shadow-md transition-all cursor-pointer group relative overflow-hidden"
             [class.ring-2]="isEditing && currentFeature.id === feat.id"
             [class.ring-blue-400]="isEditing && currentFeature.id === feat.id">
          
          <div class="flex gap-5">
            <div class="w-32 h-24 rounded-lg bg-zinc-100 overflow-hidden shrink-0 relative">
              <img *ngIf="feat.imgUrl" [src]="feat.imgUrl" class="w-full h-full object-cover group-hover:scale-105 transition-transform">
              <div *ngIf="feat.isBanner" class="absolute top-1 right-1 bg-green-500 text-white text-[8px] font-black px-1.5 py-0.5 rounded shadow-sm">
                HOME
              </div>
            </div>

            <div class="flex-1">
              <div class="flex items-start justify-between">
                <div class="max-w-[80%]">
                  <h3 class="font-black text-zinc-800 uppercase text-sm group-hover:text-blue-600 transition-colors">{{feat.name}}</h3>
                  <p class="text-xs text-zinc-500 line-clamp-2 mt-1 leading-relaxed">{{feat.desc || 'Chưa có mô tả...'}}</p>
                </div>
                
                <button (click)="onDelete(feat.id); $event.stopPropagation()" 
                        class="p-2 text-zinc-200 hover:text-red-500 transition-colors">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="size-4">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
                  </svg>
                </button>
              </div>

              <div class="mt-3 flex flex-wrap gap-1.5 items-center">
                <span class="text-[9px] font-bold text-zinc-400 uppercase mr-1">Gắn sản phẩm:</span>
                <span *ngFor="let p of feat.products" class="bg-zinc-50 text-[9px] font-bold text-zinc-500 px-1.5 py-0.5 rounded border border-zinc-100">
                  {{p.name}}
                </span>
                <span *ngIf="!feat.products?.length" class="text-[9px] text-zinc-300 italic">Chưa có sản phẩm</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
